name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: |
          packages=$(go list ./... | grep -v '/test/e2e$')
          go test -count=1 $packages

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite: [git-http, git-ssh, git-lfs, hf-cli, hf-python]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        if: matrix.suite == 'hf-cli' || matrix.suite == 'hf-python'
        with:
          python-version: "3.x"

      - name: Install huggingface_hub
        if: matrix.suite == 'hf-cli' || matrix.suite == 'hf-python'
        run: pip install 'huggingface_hub[cli]'

      - name: E2E Tests
        env:
          E2E_SUITE: ${{ matrix.suite }}
        run: go test ./test/e2e -count=1
