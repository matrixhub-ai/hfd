name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
        env:
          E2E_SUITE: unit

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: http
          - suite: ssh
          - suite: proxy
          - suite: lfs
          - suite: hook-http
          - suite: hook-ssh
          - suite: hf-cli
            python: true
          - suite: hf-python
            python: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Python
        if: matrix.python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Hugging Face tools
        if: matrix.python
        run: |
          pip install --upgrade pip
          pip install huggingface_hub

      - name: Run e2e suite
        env:
          E2E_SUITE: ${{ matrix.suite }}
        run: go test ./test/e2e -count=1
